<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Incoin Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo { font-size: 1.4rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; box-shadow: var(--shadow-lg); }
    .auth-tabs { display: flex; margin-bottom: 32px; background: var(--bg); border-radius: 10px; padding: 4px; gap: 4px; }
    .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .auth-tab.active { background: var(--gradient); color: #fff; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-form h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
    .auth-form p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; letter-spacing: 0.04em; }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 12px 14px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: rgba(124,58,237,0.6); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .auth-btn { width: 100%; padding: 13px; margin-top: 8px; font-size: 0.95rem; border-radius: 10px; }
    .auth-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; margin-top: 12px; display: none; }
    .auth-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; margin-top: 12px; display: none; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.78rem; color: var(--text-dim); }
    .auth-footer a { color: #a78bfa; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-dim); font-size: 0.75rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <a href="index.html" class="logo">
      <span class="logo-icon">⬡</span>
      <span>Incoin <span class="logo-accent">Assistant</span></span>
    </a>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</div>
      <div class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">Create Account</div>
    </div>

    <!-- SIGN IN -->
    <div class="auth-form active" id="formSignIn">
      <h2>Welcome back</h2>
      <p>Sign in to your Incoin Assistant account.</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="auth-error" id="siError"></div>
      <button class="btn btn-primary auth-btn" id="siBtn" onclick="signIn()">Sign In</button>
    </div>

    <!-- SIGN UP -->
    <div class="auth-form" id="formSignUp">
      <h2>Create your account</h2>
      <p>Get started with Incoin Assistant today — includes 5 free credits.</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="suName" placeholder="Your Name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--text-dim);font-weight:400;">(min. 8 characters)</span></label>
        <input type="password" id="suPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="auth-error"   id="suError"></div>
      <div class="auth-success" id="suSuccess"></div>
      <button class="btn btn-primary auth-btn" id="suBtn" onclick="signUp()">Create Account</button>
    </div>
  </div>

  <div class="auth-footer">
    By continuing, you agree to our
    <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
    <br/>This is a utility platform — <strong>not an earning app</strong>.
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://zuqohqbkmkcxzxcnsbyr.supabase.co',
  'sb_publishable_dTWuc6ad6xq1UDx9A_yYUQ_RNH5cuIO'
);

// Redirect if already logged in
const { data: { session } } = await supabase.auth.getSession();
if (session) window.location.href = 'dashboard.html';

// Tab switching
window.switchTab = (tab) => {
  const isSignin = (tab === 'signin');
  document.getElementById('tabSignIn').classList.toggle('active', isSignin);
  document.getElementById('tabSignUp').classList.toggle('active', !isSignin);
  document.getElementById('formSignIn').classList.toggle('active', isSignin);
  document.getElementById('formSignUp').classList.toggle('active', !isSignin);
};

// Sign In
window.signIn = async () => {
  const email    = document.getElementById('siEmail').value.trim();
  const password = document.getElementById('siPassword').value;
  const errEl    = document.getElementById('siError');
  const btn      = document.getElementById('siBtn');

  errEl.style.display = 'none';
  if (!email || !password) { showErr(errEl, 'Please fill in all fields.'); return; }

  btn.textContent = 'Signing in…'; btn.disabled = true;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    showErr(errEl, error.message);
    btn.textContent = 'Sign In'; btn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
};

// Sign Up
window.signUp = async () => {
  const name     = document.getElementById('suName').value.trim();
  const email    = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPassword').value;
  const errEl    = document.getElementById('suError');
  const sucEl    = document.getElementById('suSuccess');
  const btn      = document.getElementById('suBtn');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!name || !email || !password) { showErr(errEl, 'Please fill in all fields.'); return; }
  if (password.length < 8)          { showErr(errEl, 'Password must be at least 8 characters.'); return; }

  btn.textContent = 'Creating account…'; btn.disabled = true;

  const { error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });

  if (error) {
    showErr(errEl, error.message);
    btn.textContent = 'Create Account'; btn.disabled = false;
  } else {
    sucEl.textContent  = '✓ Account created! Please check your email to confirm, then sign in. You\'ll receive 5 free credits on your first login.';
    sucEl.style.display = 'block';
    btn.textContent = 'Account Created!';
  }
};

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formSignIn').classList.contains('active')) window.signIn();
  else window.signUp();
});
</script>
</body>
</html>
